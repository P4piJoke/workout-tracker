services:
  mongodb:
    image: mongo:7
    ports: ["27017:27017"]
    volumes:
      - mongo_data:/data/db

  elasticsearch:
    image: elasticsearch:9.3.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports: ["9200:9200"]

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    # --spi-theme-static-max-age=-1 disables theme caching during dev
    # so changes to .ftl / .css files apply on page refresh
    command: start-dev --import-realm --spi-theme-static-max-age=-1
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports: ["8180:8080"]
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json
      - ./keycloak/themes:/opt/keycloak/themes     # ← custom theme mount

volumes:
  mongo_data: